    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; background: var(--bg); }
    body {
      background: var(--bg);

    .tangle-grid {

    /* SIDEBAR (TOC) */
    .sidebar {
      background: var(--surface);

      position: sticky;

    .toc-item:hover { color: var(--accent); transform: translateX(4px); }
    .toc-item.active { color: var(--text-bright); border-left: 2px solid var(--accent); padding-left: 8px; }
    .toc-item .hex { opacity: 0.4; font-size: 0.6rem; margin-top: 2px; }

    /* CONTENT AREA */
    .viewport { position: relative; background: var(--bg); min-height: 100vh; }
    
    #canvas-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.2; }
    #text-surface { position: relative; z-index: 2; width: 100%; padding: 0 10%; }

    .line { position: absolute; white-space: pre; font-size: 1.15rem; transition: opacity 0.4s ease; will-change: transform; }
    .line.header { font-family: 'Playfair Display', serif; font-size: 3.2rem; font-weight: 900; color: var(--text-bright); }
    .line.metadata { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--accent-cold); }
    .line.section-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.3em; }

    /* TELEMETRY OVERLAY */
    .telemetry-box { position: fixed; bottom: 20px; left: 20px; font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--text-dim); z-index: 1000; background: rgba(17,17,17,0.8); padding: 5px 10px; border: 1px solid var(--line); }

<template id="prose-content">
[SECTION: opening]
[TYPE: header] Hope: A Socioeconomic Loss
[TYPE: metadata] 2026.04.02 | ~12 min read | SulkySubject37
[TYPE: space]
Hope is not comfort. It is not a soft thing that sits quietly beside you. It is a cost you pay in the present; in full; for a return that has not been promised, signed, or guaranteed by anyone.

Let's not dress it up. Hope is a transaction in which only one party shows up. You bring your time, your energy, your emotional capital, your suspended action; and on the other end sits nothing but possibility. Not probability. Possibility. The market does not reward possibility. It rewards movement.

And yet we hold it; desperately, proudly; as though it were an asset. As though to hope were to already be halfway there. It is not. It is to stand at the edge of a cliff in the dark, walking forward, not knowing whether the ground continues or simply ends.

[SECTION: cliff]
[TYPE: section-label] i. THE CLIFF ANALOGY
The tragedy of hope is not that it fails. It is that it does not tell you when it has. You do not know whether you fell or were saved until after; until the consequence arrives and makes itself known. That is the honest, brutal truth about hope that most people refuse to sit with. We want hope to feel like a safety net. We design metaphors of light at the end of tunnels, dawn after darkness, shores after storms. These are comfortable lies.

The real metaphor is the cliff. You walk toward the edge in the dark. You do not know if you have fallen or if the ground held you; not unless the consequence is there to tell you. And often, by the time it is, you have already given everything the walking required.

[SECTION: debt]
[TYPE: section-label] ii. THE DEBT TRAP
Hope is not neutral. It borrows against a future that may never arrive, and it does so without collateral, without interest disclosure, without the decency of a due date.

The poor stay poor partly because hope is cheap and abundant. It costs nothing to hope. And things that cost nothing are overconsumed. Systems; political, social, economic; are designed to harvest the surplus hope of those without power and convert it into continued compliance. You hope for a better government. You hope for a fair wage. You hope for justice. And in the hoping, the system keeps running.

Palestine is not a distant abstraction in this argument; it is the most precise illustration of it. A people whose hope has outlasted every institution that was supposed to serve them. The judiciary. The civic framework. International bodies. All of it corrupted, dismantled, or simply absent. And still; hope persists. Not because it is working. But because the alternative feels unbearable.

[SECTION: almost]
[TYPE: section-label] iii. ALMOST-GREAT
Hope is not the problem of the hopeless. The hopeless have already let go. They are done. They have moved; downward, inward, somewhere; but they have moved.

Hope is the problem of the almost-great.

The ones who almost built it. Almost launched it. Almost said the thing that needed saying. The ones who had the moment, felt it, and then; waited. Hoped a little longer. Acted a little too late. Not because they lacked courage. Because hope told them there was still time. There is always, apparently, still time.

[SECTION: vulnerability]
[TYPE: section-label] iv. VULNERABILITY
Emotional suppression is its own catastrophe. When you do not allow yourself to feel the weight of what has not worked; when you dress grief in the language of hope and call it faith; you do not process the loss. You store it. It compounds. It leaks into every subsequent decision with a quiet, unacknowledged pressure.

The courage is not in hoping. The courage is in being present to the actual situation; with all its ugliness, all its uncertainty; and acting anyway. Not because you hope it will work. But because the action is yours to take, outcome aside.

[SECTION: creator]
[TYPE: section-label] v. THE CREATOR
There is a theological reading of hope that redeems it; partially; and it is the one that demands the most from you. Hope comprises state, knowledge and deed. Knowledge is the cause which produces the state and the state decrees the deed.

The Creator does not ask for your hope. He asks for your tawakkul; trust after full effort. Trust that releases the outcome. Not hope that delays the effort while waiting for a sign.

[SECTION: verdict]
[TYPE: section-label] vii. THE VERDICT
Hope is a socioeconomic loss. Structurally.

It costs you present action. It substitutes for strategy. It keeps broken systems operational by supplying the one resource the powerless have in excess and the powerful need most; patience. Compliance dressed as faith. Waiting dressed as resilience.

Alas; hope is a conflict. And conflicts, by nature, do not resolve cleanly. They resolve in action, in consequence, in the cold clarity that only arrives after you have walked far enough to see where you actually are.

That is not hope. That is reckoning.
</template>

<script src="../js/pretext-shim.js"></script>
<script>
  const surface = document.getElementById('text-surface');
  const canvas = document.getElementById('canvas-layer');
  const ctx = canvas.getContext('2d');
  const telemetry = document.getElementById('telemetry');
  const source = document.getElementById('prose-content').innerHTML.trim();
  
  let width, height;
  const FONT_BODY = '1.15rem "EB Garamond", serif';
  const LINE_HEIGHT = 32;
  const sectionMap = {};

  function init() {
    width = canvas.width = window.innerWidth - 280;
    height = canvas.height = 10000; // Overestimated height for scroll
    render();
  }

  // Occlusion logic: return [xStart, xEnd] forbidden zone
  function getExclusion(y) {
    // 1. Singularity at top
    if (y > 200 && y < 800) {
      const centerY = 500;
      const radius = 180 + Math.sin(Date.now() * 0.001) * 10;
      const d = Math.abs(y - centerY);
      if (d < radius) {
        const span = Math.sqrt(radius**2 - d**2);
        return [(width/2) - span, (width/2) + span];
      }
    }
    // 2. The Cliff (jagged right edge)
    if (y > 1500 && y < 3000) {
      return [width * 0.7 + Math.sin(y*0.02)*40, width];
    }
    return null;
  }

  function render() {
    surface.innerHTML = '';
    const blocks = source.split(/\[SECTION: (.*?)\]/);
    let currentY = 100;

    for (let i = 1; i < blocks.length; i += 2) {
      const sectionID = blocks[i].trim();
      const content = blocks[i+1].trim();
      sectionMap[sectionID] = currentY;

      content.split('\n').forEach(block => {
        if (!block.trim()) { currentY += LINE_HEIGHT; return; }

        let type = 'body';
        let text = block;
        if (block.startsWith('[TYPE:')) {
          const m = block.match(/\[TYPE: (.*?)\] (.*)/);
          if (m) { type = m[1]; text = m[2]; }
          else if (block.includes('space')) { currentY += 80; return; }
        }

        const font = (type === 'header') ? '900 3.2rem "Playfair Display"' : 
                     (type === 'section-label') ? 'bold 0.7rem "IBM Plex Mono"' : FONT_BODY;
        const lh = (type === 'header') ? 70 : LINE_HEIGHT;

        const layout = Pretext.layoutWithExclusion(text, width * 0.8, font, currentY, lh, 
          (type === 'header' || type === 'metadata' || type === 'section-label') ? null : getExclusion);

        layout.lines.forEach(l => {
          const el = document.createElement('div');
          el.className = `line ${type}`;
          el.textContent = l.text;
          el.style.top = `${l.y}px`;
          el.style.left = `${l.x + (width * 0.1)}px`; // Center offset
          el.style.font = font;
          surface.appendChild(el);
        });

        currentY = layout.endY + 10;
      });
      currentY += 150; // Section break
    }
    surface.style.height = `${currentY + 500}px`;
  }

  function drawVisuals() {
    ctx.clearRect(0, 0, width, height);
    ctx.strokeStyle = '#2a2622';
    ctx.lineWidth = 1;

    // Singularity Wireframe
    const time = Date.now() * 0.001;
    ctx.beginPath();
    ctx.arc(width/2, 500, 180 + Math.sin(time)*10, 0, Math.PI*2);
    ctx.stroke();

    // Cliff Line
    ctx.beginPath();
    ctx.moveTo(width * 0.7, 1500);
    for(let y=1500; y<3000; y+=10) {
      ctx.lineTo(width * 0.7 + Math.sin(y*0.02)*40, y);
    }
    ctx.stroke();

    requestAnimationFrame(drawVisuals);
  }

  // --- TOC ENGINE ---
  document.querySelectorAll('.toc-item').forEach(item => {
    item.onclick = () => {
      const id = item.dataset.id;
      window.scrollTo({ top: sectionMap[id], behavior: 'smooth' });
      document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
    };
  });

  window.onmousemove = (e) => {
    telemetry.textContent = `X: ${String(e.clientX).padStart(3,'0')} | Y: ${String(Math.round(window.scrollY + e.clientY)).padStart(3,'0')} | L: ${surface.children.length}`;
  };

  window.onresize = init;
  window.onload = init;
  drawVisuals();
</script>

</body>
